name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Verify generated demo assets are in sync with the library
        run: |
          python scripts/export_patterns.py
          git diff --exit-code docs/assets/patterns.js docs/assets/context.js \
            || (echo "::error::docs/assets/*.js is stale — run scripts/export_patterns.py and commit." && exit 1)
